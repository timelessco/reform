name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions: {}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check

  lint:
    name: Lint (type-aware)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - run: bun install --frozen-lockfile
      - run: bunx oxlint --type-aware --format=github
      - run: bun run knip

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - run: bun install --frozen-lockfile
      - run: bunx oxlint --type-aware --type-check --format=github

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ELECTRIC_URL: ${{ secrets.ELECTRIC_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
      POLAR_SUCCESS_URL: ${{ secrets.POLAR_SUCCESS_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      BETTER_FORM_READ_WRITE_TOKEN: ${{ secrets.BETTER_FORM_READ_WRITE_TOKEN }}
      VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
      VITE_APP_WEBSITE_URL: ${{ secrets.VITE_APP_WEBSITE_URL }}
      VITE_APP_DOCS_URL: ${{ secrets.VITE_APP_DOCS_URL }}
      VITE_APP_API_DOCS_URL: ${{ secrets.VITE_APP_API_DOCS_URL }}
      AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_MODEL: ${{ secrets.AI_MODEL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - run: bun install --frozen-lockfile
      - run: bun run test
