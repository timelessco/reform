name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions: {}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - run: bun install --frozen-lockfile
      - run: bun run fmt:check

  lint:
    name: Lint (type-aware)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - run: bun install --frozen-lockfile
      - run: bunx oxlint --type-aware --format=github
      - run: bun run knip

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - run: bun install --frozen-lockfile
      - run: bunx oxlint --type-aware --type-check --format=github

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - run: bun install --frozen-lockfile
      - run: bun run test
